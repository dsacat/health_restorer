name: Publish verified resume-controller release

on:
  pull_request:
    branches:
      - 1.2.0-dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  publish:
    if: github.head_ref == 'agent/publish-resume-release'
    runs-on: windows-latest

    steps:
      - name: Checkout development source
        uses: actions/checkout@v6
        with:
          ref: 1.2.0-dev
          fetch-depth: 0

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Validate PowerShell source
        shell: pwsh
        run: |
          $scripts = @(
              ".\HealthRestorer.ps1",
              ".\SecureDeletedData.ps1",
              ".\ProgramResidueCleanup.ps1",
              ".\AutorunAudit.ps1",
              ".\ResumeController.ps1",
              ".\Start-HealthRestorer.ps1"
          )

          $messages = @()
          foreach ($script in $scripts) {
              $tokens = $null
              $parseErrors = $null
              [System.Management.Automation.Language.Parser]::ParseFile(
                  (Resolve-Path $script),
                  [ref]$tokens,
                  [ref]$parseErrors
              ) | Out-Null
              foreach ($parseError in @($parseErrors)) {
                  $messages += "${script}:$($parseError.Extent.StartLineNumber): $($parseError.Message)"
              }
          }

          if ($messages.Count -gt 0) {
              throw ($messages -join "`n")
          }

          $controller = Get-Content .\ResumeController.ps1 -Raw
          $launcher = Get-Content .\Start-HealthRestorer.ps1 -Raw
          $main = Get-Content .\HealthRestorer.ps1 -Raw
          $project = Get-Content .\src\HealthRestorer.Launcher\HealthRestorer.Launcher.csproj -Raw
          $program = Get-Content .\src\HealthRestorer.Launcher\Program.cs -Raw

          foreach ($required in @(
              'Start-MpWDOScan',
              'Invoke-FullDefenderScan',
              'HealthRestorer-ResumeController',
              'Wait-ForWindowsServices',
              'Stop-LegacyResumeTask',
              'for ($attempt = 1; $attempt -le 12; $attempt++)',
              'New-ScheduledTaskTrigger -AtStartup',
              'New-ScheduledTaskTrigger -AtLogOn',
              '-RestartCount 12',
              'ResumeController.ps1',
              'HealthRestorer.Embedded.ResumeController.ps1'
          )) {
              if (-not ($main.Contains($required) -or $controller.Contains($required) -or $launcher.Contains($required) -or $project.Contains($required) -or $program.Contains($required))) {
                  throw "Required continuation component is missing: $required"
              }
          }

      - name: Build Windows EXE
        shell: pwsh
        run: |
          dotnet publish `
              .\src\HealthRestorer.Launcher\HealthRestorer.Launcher.csproj `
              -c Release `
              -r win-x64 `
              --self-contained true `
              -o .\dist

      - name: Verify metadata and checksum
        shell: pwsh
        run: |
          $exe = Get-Item .\dist\HealthRestorer.exe
          $info = $exe.VersionInfo

          if ($info.CompanyName -ne "dsa_cat_studio") {
              throw "Unexpected CompanyName: $($info.CompanyName)"
          }
          if ($info.ProductName -ne "Health Restorer") {
              throw "Unexpected ProductName: $($info.ProductName)"
          }
          if ($info.FileDescription -notmatch "dsa_cat") {
              throw "Author is missing from FileDescription."
          }
          if ($info.LegalCopyright -ne "Copyright © 2026 dsa_cat") {
              throw "Unexpected copyright: $($info.LegalCopyright)"
          }
          if ($info.FileVersion -ne "1.2.0.0") {
              throw "Unexpected FileVersion: $($info.FileVersion)"
          }

          Get-FileHash .\dist\HealthRestorer.exe -Algorithm SHA256 |
              ForEach-Object { "$($_.Hash.ToLower())  HealthRestorer.exe" } |
              Set-Content .\dist\HealthRestorer.exe.sha256 -Encoding ASCII

      - name: Commit EXE to development branch
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/HealthRestorer.exe dist/HealthRestorer.exe.sha256
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
              git commit -m "Build resume-controller HealthRestorer.exe [skip ci]"
              git push origin HEAD:1.2.0-dev
          }

      - name: Publish clean release branch
        shell: pwsh
        run: |
          $source = (Get-Location).Path
          git fetch origin 1.2.0
          git worktree add .\release-worktree origin/1.2.0
          Set-Location .\release-worktree
          git checkout -B 1.2.0 origin/1.2.0

          Copy-Item "$source\dist\HealthRestorer.exe" .\HealthRestorer.exe -Force
          Copy-Item "$source\dist\HealthRestorer.exe.sha256" .\HealthRestorer.exe.sha256 -Force
          Copy-Item "$source\LICENSE.md" .\LICENSE.md -Force

          @'
          # Health Restorer 1.2.0

          Готовый автономный Windows x64 EXE.

          Исправлено автоматическое продолжение после Microsoft Defender Offline. Защищённый контроллер запускается при загрузке Windows и при входе пользователя, останавливает старое сломанное задание, ожидает готовности Task Scheduler, WMI и Microsoft Defender и повторяет запуск до 12 раз.

          После Offline Scan обязательно выполняются:

          1. полный Microsoft Defender Scan всех доступных файлов;
          2. аудит и безопасное отключение сторонней автозагрузки;
          3. проверка дисков, DISM и SFC;
          4. очистка кэшей, временных файлов и корзины;
          5. удаление подтверждённых остатков программ;
          6. оптимизация накопителей;
          7. очистка свободного пространства HDD или TRIM/ReTrim SSD.

          Текущий этап:

          ```text
          C:\Users\Public\Desktop\HealthRestorer-progress.txt
          ```

          Журнал:

          ```text
          C:\ProgramData\HealthRestorer\health-restorer.log
          ```

          Коммерческое использование запрещено без письменного разрешения dsa_cat.
          '@ | Set-Content .\README.md -Encoding UTF8

          git add HealthRestorer.exe HealthRestorer.exe.sha256 README.md LICENSE.md
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
              git commit -m "Publish fixed HealthRestorer.exe 1.2.0 [skip ci]"
              git push origin HEAD:1.2.0
          }

      - name: Upload published artifact
        uses: actions/upload-artifact@v7
        with:
          name: HealthRestorer-win-x64-published
          path: |
            dist/HealthRestorer.exe
            dist/HealthRestorer.exe.sha256
          retention-days: 90
