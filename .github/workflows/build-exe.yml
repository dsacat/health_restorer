name: Build Health Restorer EXE

on:
  push:
    branches:
      - 1.2.0-dev
    paths:
      - "HealthRestorer.ps1"
      - "SecureDeletedData.ps1"
      - "ProgramResidueCleanup.ps1"
      - "AutorunAudit.ps1"
      - "ResumeController.ps1"
      - "Start-HealthRestorer.ps1"
      - "LICENSE.md"
      - "src/HealthRestorer.Launcher/**"
      - ".github/workflows/build-exe.yml"
  pull_request:
    branches:
      - 1.2.0-dev
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: health-restorer-exe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Validate PowerShell syntax and required stages
        shell: pwsh
        run: |
          $scripts = @(
              ".\HealthRestorer.ps1",
              ".\SecureDeletedData.ps1",
              ".\ProgramResidueCleanup.ps1",
              ".\AutorunAudit.ps1",
              ".\ResumeController.ps1",
              ".\Start-HealthRestorer.ps1"
          )

          $messages = @()
          foreach ($script in $scripts) {
              $tokens = $null
              $parseErrors = $null
              [System.Management.Automation.Language.Parser]::ParseFile(
                  (Resolve-Path $script),
                  [ref]$tokens,
                  [ref]$parseErrors
              ) | Out-Null

              foreach ($parseError in @($parseErrors)) {
                  $messages += "${script}:$($parseError.Extent.StartLineNumber): $($parseError.Message)"
              }
          }

          if ($messages.Count -gt 0) {
              throw ($messages -join "`n")
          }

          $main = Get-Content -LiteralPath ".\HealthRestorer.ps1" -Raw
          foreach ($required in @(
              'Start-MpWDOScan',
              'Invoke-FullDefenderScan',
              '"-ScanType", "2"',
              'Remove-MpPreference',
              'Add-MpPreference',
              'Clear-Junk',
              'dism.exe',
              'sfc.exe',
              'chkdsk.exe',
              'defrag.exe'
          )) {
              if (-not $main.Contains($required)) {
                  throw "Required maintenance stage is missing: $required"
              }
          }

          if ($main -notmatch '"AfterOffline"\s*\{\s*Invoke-FullDefenderScan\s+Disable-Startup') {
              throw "Mandatory full scan is not placed between Offline Scan and maintenance."
          }

          $controller = Get-Content -LiteralPath ".\ResumeController.ps1" -Raw
          foreach ($required in @(
              'HealthRestorer-ResumeController',
              'Stop-LegacyResumeTask',
              'Wait-ForWindowsServices',
              'Get-MpComputerStatus',
              'for ($attempt = 1; $attempt -le 12; $attempt++)',
              'HealthRestorer-progress.txt',
              '-Mode", "Resume"'
          )) {
              if (-not $controller.Contains($required)) {
                  throw "Resume-controller requirement is missing: $required"
              }
          }

          $autorun = Get-Content -LiteralPath ".\AutorunAudit.ps1" -Raw
          foreach ($required in @(
              'Win32_StartupCommand',
              'Winlogon',
              'AppInit',
              'IFEO',
              'ScheduledTask',
              'AutoService',
              'BootOrAutoDriver',
              'WmiEventFilter',
              'User Shell Folders'
          )) {
              if (-not $autorun.Contains($required)) {
                  throw "Hidden autorun audit coverage is missing: $required"
              }
          }

          $residue = Get-Content -LiteralPath ".\ProgramResidueCleanup.ps1" -Raw
          if ($residue -notmatch 'Uninstall|Residue|остат') {
              throw "Program residue cleanup module is missing."
          }

          $secure = Get-Content -LiteralPath ".\SecureDeletedData.ps1" -Raw
          foreach ($required in @(
              'DriveType -in @(2, 3)',
              'cipher.exe',
              'Invoke-FreeSpaceOverwriteGeneric',
              'ReTrim',
              'deleted-data-summary.json'
          )) {
              if (-not $secure.Contains($required)) {
                  throw "Deleted-data cleanup coverage is missing: $required"
              }
          }

          $launcher = Get-Content -LiteralPath ".\Start-HealthRestorer.ps1" -Raw
          foreach ($required in @(
              'ResumeController.ps1',
              'HealthRestorer-ResumeController',
              'New-ScheduledTaskTrigger -AtStartup',
              'New-ScheduledTaskTrigger -AtLogOn',
              '-RestartCount 12',
              'AutorunAudit.ps1',
              'autorun-audit.json'
          )) {
              if (-not $launcher.Contains($required)) {
                  throw "Launcher continuation requirement is missing: $required"
              }
          }

          $project = Get-Content -LiteralPath ".\src\HealthRestorer.Launcher\HealthRestorer.Launcher.csproj" -Raw
          foreach ($required in @('AutorunAudit.ps1', 'ResumeController.ps1')) {
              if (-not $project.Contains($required)) {
                  throw "EXE embedded resource is missing: $required"
              }
          }

          $program = Get-Content -LiteralPath ".\src\HealthRestorer.Launcher\Program.cs" -Raw
          if (-not $program.Contains('HealthRestorer.Embedded.ResumeController.ps1')) {
              throw "Resume controller is not extracted by the EXE launcher."
          }

      - name: Publish single-file Windows EXE
        shell: pwsh
        run: |
          dotnet publish `
            .\src\HealthRestorer.Launcher\HealthRestorer.Launcher.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o .\dist

      - name: Verify EXE metadata and create checksum
        shell: pwsh
        run: |
          $exe = Get-Item .\dist\HealthRestorer.exe
          $info = $exe.VersionInfo

          if ($info.CompanyName -ne "dsa_cat_studio") {
              throw "Unexpected CompanyName: $($info.CompanyName)"
          }

          if ($info.ProductName -ne "Health Restorer") {
              throw "Unexpected ProductName: $($info.ProductName)"
          }

          if ($info.FileDescription -notmatch "dsa_cat") {
              throw "Author was not found in FileDescription: $($info.FileDescription)"
          }

          if ($info.LegalCopyright -ne "Copyright © 2026 dsa_cat") {
              throw "Unexpected copyright: $($info.LegalCopyright)"
          }

          if ($info.FileVersion -ne "1.2.0.0") {
              throw "Unexpected FileVersion: $($info.FileVersion)"
          }

          $bytes = [IO.File]::ReadAllBytes((Resolve-Path .\dist\HealthRestorer.exe))
          $ascii = [Text.Encoding]::ASCII.GetString($bytes)
          if ($ascii -notmatch 'ResumeController\.ps1') {
              throw "The compiled EXE does not contain the resume-controller resource name."
          }

          Get-FileHash .\dist\HealthRestorer.exe -Algorithm SHA256 |
              ForEach-Object { "$($_.Hash.ToLower())  HealthRestorer.exe" } |
              Set-Content .\dist\HealthRestorer.exe.sha256 -Encoding ASCII

      - name: Commit verified EXE to development branch
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/HealthRestorer.exe dist/HealthRestorer.exe.sha256

          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
              git commit -m "Build verified HealthRestorer.exe [skip ci]"
              git push origin HEAD:1.2.0-dev
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v7
        with:
          name: HealthRestorer-win-x64-resume-controller
          path: |
            dist/HealthRestorer.exe
            dist/HealthRestorer.exe.sha256
          retention-days: 90
