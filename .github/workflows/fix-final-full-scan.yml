name: Fix final confirmed Defender full scan

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  fix-build-publish:
    if: github.head_ref == 'agent/final-full-scan-fix'
    runs-on: windows-latest

    steps:
      - name: Checkout development branch
        uses: actions/checkout@v6
        with:
          ref: 1.2.0-dev
          fetch-depth: 0

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Move full scan to final stage and require confirmation
        shell: pwsh
        run: |
          $patch = @'
          from pathlib import Path
          import re

          def replace_once(text, pattern, replacement, label):
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise RuntimeError(f"Could not replace {label}: matches={count}")
              return updated

          main_path = Path("HealthRestorer.ps1")
          main = main_path.read_text(encoding="utf-8-sig")

          if '$ProgramResidueSummaryPath' not in main:
              main = main.replace(
                  '$FullScanReportPath = Join-Path $Root "defender-full-scan-report.txt"\n',
                  '$FullScanReportPath = Join-Path $Root "defender-full-scan-report.txt"\n'
                  '$ProgramResidueSummaryPath = Join-Path $Root "program-residue-summary.json"\n'
                  '$DeletedDataSummaryPath = Join-Path $Root "deleted-data-summary.json"\n'
              )

          full_scan = r'''function Get-DefenderStatusDate {
              param($Value)

              if ($null -eq $Value) {
                  return $null
              }

              try {
                  $date = [datetime]$Value
                  if ($date.Year -lt 2000) {
                      return $null
                  }
                  return $date
              }
              catch {
                  return $null
              }
          }

          function Invoke-FullDefenderScan {
              $status = Get-MpComputerStatus -ErrorAction Stop
              if (-not $status.AntivirusEnabled) {
                  throw "Microsoft Defender Antivirus is disabled."
              }

              try {
                  Update-MpSignature -ErrorAction Stop
                  Write-Log "Defender signatures updated before final full scan."
              }
              catch {
                  Write-Log (
                      "Defender signature update before final full scan failed: {0}" -f `
                          $_.Exception.Message
                  )
              }

              $preference = Get-MpPreference -ErrorAction Stop
              $desiredOptions = [ordered]@{
                  DisableArchiveScanning = $false
                  DisableEmailScanning = $false
                  DisableRemovableDriveScanning = $false
                  DisableRestorePoint = $false
                  DisableScanningMappedNetworkDrivesForFullScan = $false
                  DisableScanningNetworkFiles = $false
                  DisableScriptScanning = $false
                  CheckForSignaturesBeforeRunningScan = $true
              }
              $savedOptions = [ordered]@{}

              foreach ($name in $desiredOptions.Keys) {
                  if ($preference.PSObject.Properties.Name -contains $name) {
                      $savedOptions[$name] = [bool]$preference.$name
                  }
              }

              $savedExclusions = [ordered]@{
                  Path = @($preference.ExclusionPath | Where-Object { $_ })
                  Extension = @($preference.ExclusionExtension | Where-Object { $_ })
                  Process = @($preference.ExclusionProcess | Where-Object { $_ })
              }

              [pscustomobject]@{
                  SavedAt = (Get-Date).ToString("o")
                  Options = $savedOptions
                  Exclusions = $savedExclusions
              } |
                  ConvertTo-Json -Depth 8 |
                  Set-Content -LiteralPath $DefenderBackupPath -Encoding UTF8

              $stdoutPath = Join-Path $Root "defender-full-scan.stdout.log"
              $stderrPath = Join-Path $Root "defender-full-scan.stderr.log"
              Remove-Item -LiteralPath $stdoutPath, $stderrPath -Force -ErrorAction SilentlyContinue

              try {
                  foreach ($name in $savedOptions.Keys) {
                      try {
                          Set-DefenderBooleanPreference `
                              -Name $name `
                              -Value ([bool]$desiredOptions[$name])
                          Write-Log ("Configured final full-scan coverage: {0}" -f $name)
                      }
                      catch {
                          Write-Log (
                              "Could not configure Defender option {0}: {1}" -f `
                                  $name, $_.Exception.Message
                          )
                      }
                  }

                  foreach ($kind in @("Path", "Extension", "Process")) {
                      $values = @($savedExclusions[$kind])
                      if ($values.Count -eq 0) {
                          continue
                      }

                      try {
                          $parameters = @{ ErrorAction = "Stop" }
                          $parameters["Exclusion$kind"] = $values
                          Remove-MpPreference @parameters
                          Write-Log (
                              "Temporarily removed Defender {0} exclusions: {1}" -f `
                                  $kind, $values.Count
                          )
                      }
                      catch {
                          Write-Log (
                              "Could not remove Defender {0} exclusions: {1}" -f `
                                  $kind, $_.Exception.Message
                          )
                      }
                  }

                  $before = Get-MpComputerStatus -ErrorAction Stop
                  $baselineStart = Get-DefenderStatusDate $before.FullScanStartTime
                  $baselineEnd = Get-DefenderStatusDate $before.FullScanEndTime
                  $requestedAt = Get-Date

                  Write-Log "Requesting final Microsoft Defender full scan. Waiting for Defender to confirm a new FullScanStartTime."

                  $scanCommand = '$ErrorActionPreference = "Stop"; Start-MpScan -ScanType FullScan -ErrorAction Stop'
                  $encodedCommand = [Convert]::ToBase64String(
                      [Text.Encoding]::Unicode.GetBytes($scanCommand)
                  )
                  $process = Start-Process `
                      -FilePath $PowerShell `
                      -ArgumentList @(
                          "-NoProfile",
                          "-NonInteractive",
                          "-EncodedCommand", $encodedCommand
                      ) `
                      -RedirectStandardOutput $stdoutPath `
                      -RedirectStandardError $stderrPath `
                      -PassThru `
                      -WindowStyle Hidden

                  $confirmedStart = $null
                  $startDeadline = (Get-Date).AddMinutes(15)
                  while ((Get-Date) -lt $startDeadline) {
                      $current = Get-MpComputerStatus -ErrorAction Stop
                      $candidate = Get-DefenderStatusDate $current.FullScanStartTime

                      $isNewStart = $null -ne $candidate -and
                          ($null -eq $baselineStart -or $candidate -gt $baselineStart) -and
                          $candidate -ge $requestedAt.AddMinutes(-2)

                      if ($isNewStart) {
                          $confirmedStart = $candidate
                          break
                      }

                      if ($process.HasExited -and $process.ExitCode -ne 0) {
                          $errorText = if (Test-Path -LiteralPath $stderrPath) {
                              Get-Content -LiteralPath $stderrPath -Raw
                          }
                          else {
                              "No stderr output."
                          }
                          throw "Defender rejected the full-scan request. Exit code $($process.ExitCode). $errorText"
                      }

                      Start-Sleep -Seconds 5
                  }

                  if ($null -eq $confirmedStart) {
                      if (-not $process.HasExited) {
                          Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
                      }
                      throw "Defender did not confirm a new full scan within 15 minutes. The log must not claim that scanning started."
                  }

                  Write-Log (
                      "CONFIRMED: Microsoft Defender final full scan actually started at {0}." -f `
                          $confirmedStart.ToString("yyyy-MM-dd HH:mm:ss")
                  )

                  $confirmedEnd = $null
                  $completionDeadline = (Get-Date).AddDays(7)
                  while ((Get-Date) -lt $completionDeadline) {
                      $current = Get-MpComputerStatus -ErrorAction Stop
                      $candidateEnd = Get-DefenderStatusDate $current.FullScanEndTime

                      if ($null -ne $candidateEnd -and $candidateEnd -ge $confirmedStart) {
                          $confirmedEnd = $candidateEnd
                          break
                      }

                      if ($process.HasExited -and $process.ExitCode -ne 0) {
                          $errorText = if (Test-Path -LiteralPath $stderrPath) {
                              Get-Content -LiteralPath $stderrPath -Raw
                          }
                          else {
                              "No stderr output."
                          }
                          throw "Confirmed full scan stopped with exit code $($process.ExitCode). $errorText"
                      }

                      Start-Sleep -Seconds 15
                  }

                  if ($null -eq $confirmedEnd) {
                      if (-not $process.HasExited) {
                          Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
                      }
                      throw "Defender did not confirm FullScanEndTime within seven days."
                  }

                  if (-not $process.HasExited) {
                      $process.WaitForExit(60000) | Out-Null
                  }
                  if (-not $process.HasExited) {
                      Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
                  }

                  $exitCode = if ($process.HasExited) {
                      $process.ExitCode
                  }
                  else {
                      "terminated-after-confirmed-completion"
                  }
                  $outputText = if (Test-Path -LiteralPath $stdoutPath) {
                      Get-Content -LiteralPath $stdoutPath -Raw
                  }
                  else {
                      ""
                  }
                  $errorText = if (Test-Path -LiteralPath $stderrPath) {
                      Get-Content -LiteralPath $stderrPath -Raw
                  }
                  else {
                      ""
                  }
                  $detections = Get-MpThreatDetection -ErrorAction SilentlyContinue |
                      Select-Object `
                          -First 100 `
                          InitialDetectionTime, ThreatName, ActionSuccess, Resources

                  @(
                      "Confirmed final Microsoft Defender full scan"
                      "Requested: $($requestedAt.ToString('yyyy-MM-dd HH:mm:ss'))"
                      "Confirmed start: $($confirmedStart.ToString('yyyy-MM-dd HH:mm:ss'))"
                      "Confirmed end: $($confirmedEnd.ToString('yyyy-MM-dd HH:mm:ss'))"
                      "Duration: $(($confirmedEnd - $confirmedStart).ToString())"
                      "Launcher exit code: $exitCode"
                      "Baseline start: $baselineStart"
                      "Baseline end: $baselineEnd"
                      ""
                      "Standard output:"
                      $outputText
                      ""
                      "Standard error:"
                      $errorText
                      ""
                      "Recent detections:"
                      ($detections | Format-List | Out-String)
                  ) | Set-Content -LiteralPath $FullScanReportPath -Encoding UTF8

                  Write-Log (
                      "CONFIRMED: Microsoft Defender final full scan completed at {0}." -f `
                          $confirmedEnd.ToString("yyyy-MM-dd HH:mm:ss")
                  )
              }
              finally {
                  foreach ($kind in @("Path", "Extension", "Process")) {
                      $values = @($savedExclusions[$kind])
                      if ($values.Count -eq 0) {
                          continue
                      }

                      try {
                          $parameters = @{ ErrorAction = "Stop" }
                          $parameters["Exclusion$kind"] = $values
                          Add-MpPreference @parameters
                          Write-Log (
                              "Restored Defender {0} exclusions: {1}" -f `
                                  $kind, $values.Count
                          )
                      }
                      catch {
                          Write-Log (
                              "Could not restore Defender {0} exclusions: {1}" -f `
                                  $kind, $_.Exception.Message
                          )
                      }
                  }

                  foreach ($name in $savedOptions.Keys) {
                      try {
                          Set-DefenderBooleanPreference `
                              -Name $name `
                              -Value ([bool]$savedOptions[$name])
                      }
                      catch {
                          Write-Log (
                              "Could not restore Defender option {0}: {1}" -f `
                                  $name, $_.Exception.Message
                          )
                      }
                  }
              }
          }

          function Repair-And-Optimize {'''

          main = replace_once(
              main,
              r'function Invoke-FullDefenderScan \{.*?\n\}\n\nfunction Repair-And-Optimize \{',
              full_scan,
              "full scan function"
          )

          main = main.replace(
              '    Register-ResumeTask\n    Set-Content -LiteralPath $StatePath -Value "AfterOffline" -Encoding ASCII',
              '    Set-Content -LiteralPath $StatePath -Value "AfterOffline" -Encoding ASCII'
          )

          resume = r'''function Resume-Workflow {
              if (-not (Test-Path -LiteralPath $StatePath)) {
                  throw "State file was not found."
              }

              $state = (Get-Content -LiteralPath $StatePath -Raw).Trim()

              switch ($state) {
                  "AfterOffline" {
                      Disable-Startup | Out-Null
                      Set-Content -LiteralPath $StatePath -Value "AfterDisk" -Encoding ASCII
                      Invoke-Native "chkntfs.exe" @("/c", $env:SystemDrive) | Out-Null
                      Invoke-Native `
                          "fsutil.exe" `
                          @("dirty", "set", $env:SystemDrive) | Out-Null
                      Write-Log "Boot-time disk check scheduled. Full scan is intentionally deferred until every cleanup stage is finished."
                      Restart-Computer -Force
                  }
                  "AfterDisk" {
                      Set-Content -LiteralPath $StatePath -Value "Maintenance" -Encoding ASCII
                      Repair-And-Optimize
                      Set-Content -LiteralPath $StatePath -Value "CleanupPending" -Encoding ASCII
                      Write-Log "Main maintenance completed. Waiting for program-residue and deleted-data cleanup before the final full scan."
                  }
                  "Maintenance" {
                      Repair-And-Optimize
                      Set-Content -LiteralPath $StatePath -Value "CleanupPending" -Encoding ASCII
                      Write-Log "Interrupted maintenance resumed. Waiting for final cleanup before the full scan."
                  }
                  "CleanupPending" {
                      Write-Log "Final cleanup is still running. Full scan has not started."
                  }
                  "FinalScanPending" {
                      Set-Content -LiteralPath $StatePath -Value "FinalScanRunning" -Encoding ASCII
                      Invoke-FullDefenderScan
                      Write-Report
                      Set-Content -LiteralPath $StatePath -Value "Completed" -Encoding ASCII
                      Remove-ResumeTask
                      Write-Log "All cleanup stages and the confirmed final full scan completed."
                  }
                  "FinalScanRunning" {
                      Write-Log "A previous final full scan was interrupted. Starting a new confirmed full scan."
                      Invoke-FullDefenderScan
                      Write-Report
                      Set-Content -LiteralPath $StatePath -Value "Completed" -Encoding ASCII
                      Remove-ResumeTask
                      Write-Log "Interrupted final full scan was repeated and completed."
                  }
                  "Completed" {
                      Remove-ResumeTask
                  }
                  default {
                      throw "Unknown state: $state"
                  }
              }
          }

          if (-not (Test-Admin)) {'''

          main = replace_once(
              main,
              r'function Resume-Workflow \{.*?\n\}\n\nif \(-not \(Test-Admin\)\) \{',
              resume,
              "resume workflow"
          )

          if 'Program residue summary:' not in main:
              main = main.replace(
                  '    $threats = Get-MpThreatDetection -ErrorAction SilentlyContinue |',
                  '''    $residueSummary = if (Test-Path -LiteralPath $ProgramResidueSummaryPath) {
                      Get-Content -LiteralPath $ProgramResidueSummaryPath -Raw
                  }
                  else {
                      "Program residue summary was not found."
                  }
                  $deletedDataSummary = if (Test-Path -LiteralPath $DeletedDataSummaryPath) {
                      Get-Content -LiteralPath $DeletedDataSummaryPath -Raw
                  }
                  else {
                      "Deleted-data summary was not found."
                  }
                  $threats = Get-MpThreatDetection -ErrorAction SilentlyContinue |'''
              )
              main = main.replace(
                  '        $fullScan\n        ""\n        "Recent Microsoft Defender detections:"',
                  '''        "Program residue summary:"
                      $residueSummary
                      ""
                      "Deleted-data cleanup summary:"
                      $deletedDataSummary
                      ""
                      $fullScan
                      ""
                      "Recent Microsoft Defender detections:"'''
              )

          main_path.write_text(main, encoding="utf-8")

          secure_path = Path("SecureDeletedData.ps1")
          secure = secure_path.read_text(encoding="utf-8-sig")

          ready_function = r'''function Test-MainWorkflowReadyForCleanup {
              if (Test-Path -LiteralPath $StateJsonPath) {
                  try {
                      $state = Get-Content -LiteralPath $StateJsonPath -Raw | ConvertFrom-Json
                      if ([string]$state.Stage -eq "CleanupPending") {
                          return $true
                      }
                  }
                  catch {
                      Write-Log ("Could not read state.json: {0}" -f $_.Exception.Message)
                  }
              }

              if (Test-Path -LiteralPath $StateTextPath) {
                  try {
                      if ((Get-Content -LiteralPath $StateTextPath -Raw).Trim() -eq "CleanupPending") {
                          return $true
                      }
                  }
                  catch {
                      Write-Log ("Could not read state.txt: {0}" -f $_.Exception.Message)
                  }
              }

              return $false
          }

          function Invoke-ProgramResidueCleanup {'''

          secure = replace_once(
              secure,
              r'function Test-MainWorkflowCompleted \{.*?\n\}\n\nfunction Invoke-ProgramResidueCleanup \{',
              ready_function,
              "cleanup readiness function"
          )
          secure = secure.replace(
              'Write-Log "Secure cleanup is waiting for the main workflow to complete."',
              'Write-Log "Secure cleanup is waiting for main maintenance to reach CleanupPending."'
          )
          secure = secure.replace(
              'while (-not (Test-MainWorkflowCompleted)) {',
              'while (-not (Test-MainWorkflowReadyForCleanup)) {'
          )
          secure = secure.replace(
              'throw "The main workflow did not reach Completed state within 31 days."',
              'throw "The main workflow did not reach CleanupPending state within 31 days."'
          )
          secure = secure.replace(
              '    Write-Log "Program residue and deleted-data cleanup completed."',
              '''    Write-Log "Program residue and deleted-data cleanup completed."
                  Set-Content -LiteralPath $StateTextPath -Value "FinalScanPending" -Encoding ASCII
                  Write-Log "Final cleanup confirmed. State changed to FinalScanPending; the full scan can now run as the last stage."'''
          )
          secure = re.sub(
              r'\n    \$report = Join-Path \$env:PUBLIC "Desktop\\HealthRestorer-report\.txt".*?\n    \) -ErrorAction SilentlyContinue',
              '',
              secure,
              count=1,
              flags=re.S
          )
          secure_path.write_text(secure, encoding="utf-8")

          controller_path = Path("ResumeController.ps1")
          controller = controller_path.read_text(encoding="utf-8-sig")
          controller = controller.replace(
              '        "AfterOffline" {\n            return "Running the mandatory full Microsoft Defender scan of all accessible files."\n        }',
              '        "AfterOffline" {\n            return "Preparing maintenance and the boot-time disk check. The full scan is deferred until the end."\n        }'
          )
          if '"CleanupPending" {' not in controller:
              controller = controller.replace(
                  '        "Maintenance" {\n            return "Resuming interrupted Windows maintenance."\n        }',
                  '''        "Maintenance" {
                      return "Resuming interrupted Windows maintenance."
                  }
                  "CleanupPending" {
                      return "Removing program residues and clearing recoverable deleted-file data before the final full scan."
                  }
                  "FinalScanPending" {
                      return "Starting the final full Microsoft Defender scan after every cleanup stage."
                  }
                  "FinalScanRunning" {
                      return "The confirmed final full Microsoft Defender scan is running."
                  }'''
              )
          if '$state -eq "CleanupPending"' not in controller:
              controller = controller.replace(
                  '        Write-Log ("Resume attempt {0}/12. Current state: {1}." -f $attempt, $state)',
                  '''        if ($state -eq "CleanupPending") {
                      Write-Progress `
                          -Stage "CleanupPending" `
                          -Details (Get-StageDescription -State $state)
                      Start-Sleep -Seconds 60
                      $attempt--
                      continue
                  }

                  Write-Log ("Resume attempt {0}/12. Current state: {1}." -f $attempt, $state)'''
              )
          controller_path.write_text(controller, encoding="utf-8")

          readme_path = Path("README.md")
          readme = readme_path.read_text(encoding="utf-8-sig")
          order = '''## Порядок работы

          1. Обновляются базы Microsoft Defender.
          2. Запускается Microsoft Defender Offline до обычной загрузки Windows.
          3. После загрузки отключается безопасная сторонняя автозагрузка с резервной копией.
          4. Выполняется предзагрузочная проверка системного диска.
          5. DISM и SFC восстанавливают Windows.
          6. Проверяются и оптимизируются доступные диски.
          7. Очищаются временные файлы, кэши Windows и браузеров, DNS-кэш, эскизы и корзина.
          8. Удаляются подтверждённые остатки не до конца удалённых программ.
          9. Очищается доступное свободное пространство, в котором могут оставаться удалённые файлы: перезапись HDD и TRIM/ReTrim для SSD.
          10. **Последним рабочим этапом** запускается Microsoft Defender Full Scan всех доступных файлов.
          11. Программа не пишет «сканирование началось», пока Defender не подтвердит новое значение `FullScanStartTime`.
          12. Завершение принимается только после подтверждённого нового `FullScanEndTime`; затем создаётся итоговый отчёт.

          '''
          readme = replace_once(
              readme,
              r'## Порядок работы\n.*?(?=## Что означает)',
              order,
              "README order"
          )
          readme = readme.replace(
              'Программа ждёт завершения процесса сканирования. Стандартный максимальный срок проверки увеличен до 30 дней.',
              'Запрос выполняется через `Start-MpScan -ScanType FullScan`. Фактический запуск подтверждается новым `FullScanStartTime`, а завершение — новым `FullScanEndTime`. Если Defender не подтвердил запуск, журнал прямо сообщает об ошибке и не утверждает, что сканирование началось.'
          )
          readme_path.write_text(readme, encoding="utf-8")

          workflow_path = Path(".github/workflows/build-exe.yml")
          workflow = workflow_path.read_text(encoding="utf-8-sig")
          workflow = workflow.replace(
              "          if ($main -notmatch '\"AfterOffline\"\\s*\\{\\s*Invoke-FullDefenderScan\\s+Disable-Startup') {\n              throw \"Mandatory full scan is not placed between Offline Scan and maintenance.\"\n          }",
              '''          foreach ($required in @(
                    'FullScanStartTime',
                    'FullScanEndTime',
                    'CONFIRMED: Microsoft Defender final full scan actually started',
                    'CleanupPending',
                    'FinalScanPending',
                    'FinalScanRunning'
                )) {
                    if (-not $main.Contains($required)) {
                        throw "Confirmed final-scan requirement is missing: $required"
                    }
                }

                if ($main -match '"AfterOffline"\\s*\\{[^}]*Invoke-FullDefenderScan') {
                    throw "Full scan must not run immediately after Offline Scan."
                }

                if ($main -notmatch '"FinalScanPending"\\s*\\{[^}]*Invoke-FullDefenderScan') {
                    throw "Full scan is not placed in the final stage."
                }'''
          )
          if "Secure cleanup does not hand off to the final scan" not in workflow:
              workflow = workflow.replace(
                  "          foreach ($required in @(\n              'DriveType -in @(2, 3)',",
                  "          foreach ($required in @(\n              'CleanupPending',\n              'FinalScanPending',\n              'DriveType -in @(2, 3)',"
              )
          workflow_path.write_text(workflow, encoding="utf-8")
          '@

          Set-Content -LiteralPath .\final-scan-patch.py -Value $patch -Encoding UTF8
          python .\final-scan-patch.py
          Remove-Item .\final-scan-patch.py -Force

      - name: Validate PowerShell syntax and final-stage order
        shell: pwsh
        run: |
          $scripts = @(
              '.\HealthRestorer.ps1',
              '.\SecureDeletedData.ps1',
              '.\ProgramResidueCleanup.ps1',
              '.\AutorunAudit.ps1',
              '.\ResumeController.ps1',
              '.\Start-HealthRestorer.ps1'
          )

          $errors = @()
          foreach ($script in $scripts) {
              $tokens = $null
              $parseErrors = $null
              [System.Management.Automation.Language.Parser]::ParseFile(
                  (Resolve-Path $script),
                  [ref]$tokens,
                  [ref]$parseErrors
              ) | Out-Null
              foreach ($parseError in @($parseErrors)) {
                  $errors += "${script}:$($parseError.Extent.StartLineNumber): $($parseError.Message)"
              }
          }
          if ($errors.Count -gt 0) {
              throw ($errors -join "`n")
          }

          $main = Get-Content .\HealthRestorer.ps1 -Raw
          foreach ($required in @(
              'Start-MpWDOScan',
              'Start-MpScan -ScanType FullScan',
              'FullScanStartTime',
              'FullScanEndTime',
              'CONFIRMED: Microsoft Defender final full scan actually started',
              'CleanupPending',
              'FinalScanPending',
              'FinalScanRunning',
              'Clear-Junk',
              'dism.exe',
              'sfc.exe',
              'chkdsk.exe',
              'defrag.exe'
          )) {
              if (-not $main.Contains($required)) {
                  throw "Missing required stage: $required"
              }
          }
          if ($main -match '"AfterOffline"\s*\{[^}]*Invoke-FullDefenderScan') {
              throw 'Full scan still runs too early.'
          }
          if ($main -notmatch '"FinalScanPending"\s*\{[^}]*Invoke-FullDefenderScan') {
              throw 'Full scan is not in the final state.'
          }
          if ($main -match 'Start-Workflow\s*\{[^}]*Register-ResumeTask') {
              throw 'Legacy resume task is still registered by the EXE workflow.'
          }

          $secure = Get-Content .\SecureDeletedData.ps1 -Raw
          foreach ($required in @('CleanupPending', 'FinalScanPending', 'Clear-DeletedData')) {
              if (-not $secure.Contains($required)) {
                  throw "Final cleanup handoff missing: $required"
              }
          }

      - name: Build single-file Windows EXE
        shell: pwsh
        run: |
          dotnet publish `
            .\src\HealthRestorer.Launcher\HealthRestorer.Launcher.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o .\dist

      - name: Verify metadata and checksum
        shell: pwsh
        run: |
          $exe = Get-Item .\dist\HealthRestorer.exe
          $info = $exe.VersionInfo
          if ($info.CompanyName -ne 'dsa_cat_studio') { throw "Unexpected company: $($info.CompanyName)" }
          if ($info.ProductName -ne 'Health Restorer') { throw "Unexpected product: $($info.ProductName)" }
          if ($info.FileDescription -notmatch 'dsa_cat') { throw "Author missing: $($info.FileDescription)" }
          if ($info.LegalCopyright -ne 'Copyright © 2026 dsa_cat') { throw "Unexpected copyright" }
          if ($info.FileVersion -ne '1.2.0.0') { throw "Unexpected version: $($info.FileVersion)" }
          Get-FileHash .\dist\HealthRestorer.exe -Algorithm SHA256 |
              ForEach-Object { "$($_.Hash.ToLower())  HealthRestorer.exe" } |
              Set-Content .\dist\HealthRestorer.exe.sha256 -Encoding ASCII

      - name: Commit verified source and EXE to development branch
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add HealthRestorer.ps1 SecureDeletedData.ps1 ResumeController.ps1 README.md .github/workflows/build-exe.yml dist/HealthRestorer.exe dist/HealthRestorer.exe.sha256
          git commit -m 'Fix final confirmed Defender full scan [skip ci]'
          git push origin HEAD:1.2.0-dev

      - name: Publish clean release branch
        shell: pwsh
        run: |
          git fetch origin 1.2.0
          $release = Join-Path $env:RUNNER_TEMP 'health-restorer-release'
          git worktree add $release origin/1.2.0
          Copy-Item .\dist\HealthRestorer.exe (Join-Path $release 'HealthRestorer.exe') -Force
          Copy-Item .\dist\HealthRestorer.exe.sha256 (Join-Path $release 'HealthRestorer.exe.sha256') -Force
          Copy-Item .\README.md (Join-Path $release 'README.md') -Force
          Copy-Item .\LICENSE.md (Join-Path $release 'LICENSE.md') -Force
          Push-Location $release
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add HealthRestorer.exe HealthRestorer.exe.sha256 README.md LICENSE.md
          git commit -m 'Publish final confirmed full-scan release'
          git push origin HEAD:1.2.0
          Pop-Location

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: HealthRestorer-win-x64-final-confirmed-scan
          path: |
            dist/HealthRestorer.exe
            dist/HealthRestorer.exe.sha256
          retention-days: 90

      - name: Remove temporary workflow and branch
        if: always()
        shell: pwsh
        run: |
          git fetch origin main
          $mainWork = Join-Path $env:RUNNER_TEMP 'health-restorer-main'
          git worktree add $mainWork origin/main
          Push-Location $mainWork
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          Remove-Item .github/workflows/fix-final-full-scan.yml -Force -ErrorAction SilentlyContinue
          git add -A
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
              git commit -m 'Remove final full-scan repair workflow [skip ci]'
              git push origin HEAD:main
          }
          Pop-Location
          git push origin --delete agent/final-full-scan-fix 2>$null
