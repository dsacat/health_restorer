name: Fix resume and build release

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  fix-build-release:
    if: github.head_ref == 'agent/run-resume-fix'
    runs-on: windows-latest

    steps:
      - name: Checkout development branch
        uses: actions/checkout@v6
        with:
          ref: 1.2.0-dev
          fetch-depth: 0

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Fix post-offline continuation
        shell: pwsh
        run: |
          $patch = @'
          from pathlib import Path
          import re

          path = Path("HealthRestorer.ps1")
          text = path.read_text(encoding="utf-8-sig")

          if '$TaskPath = "\\Microsoft\\HealthRestorer\\"' not in text:
              text = text.replace(
                  '$TaskName = "HealthRestorer-OneTime"\n$PowerShell =',
                  '$TaskName = "HealthRestorer-OneTime"\n'
                  '$TaskPath = "\\Microsoft\\HealthRestorer\\"\n'
                  '$ProgressPath = Join-Path $env:PUBLIC "Desktop\\HealthRestorer-progress.txt"\n'
                  '$PowerShell ='
              )

          helpers = r'''function Write-Progress {
              param(
                  [string]$Stage,
                  [string]$Details
              )

              $desktop = Split-Path $ProgressPath -Parent
              New-Item -ItemType Directory -Path $desktop -Force | Out-Null
              @(
                  "Health Restorer"
                  "Updated: $((Get-Date).ToString('yyyy-MM-dd HH:mm:ss'))"
                  "Stage: $Stage"
                  "Details: $Details"
                  "Log: $LogPath"
              ) | Set-Content -LiteralPath $ProgressPath -Encoding UTF8
              Write-Log ("PROGRESS [{0}] {1}" -f $Stage, $Details)
          }

          function Wait-ForResumePrerequisites {
              Write-Progress `
                  -Stage "WaitingForWindows" `
                  -Details "Waiting for Windows, Task Scheduler, WMI and Microsoft Defender services."

              $deadline = (Get-Date).AddMinutes(30)
              while ((Get-Date) -lt $deadline) {
                  $servicesReady = $true
                  foreach ($name in @("Schedule", "Winmgmt", "WinDefend")) {
                      $service = Get-Service -Name $name -ErrorAction SilentlyContinue
                      if ($null -eq $service) {
                          $servicesReady = $false
                          continue
                      }

                      if ($service.Status -ne "Running") {
                          Start-Service -Name $name -ErrorAction SilentlyContinue
                          $servicesReady = $false
                      }
                  }

                  if ($servicesReady) {
                      try {
                          $status = Get-MpComputerStatus -ErrorAction Stop
                          if ($status.AntivirusEnabled) {
                              Start-Sleep -Seconds 30
                              Write-Progress `
                                  -Stage "WindowsReady" `
                                  -Details "Windows and Microsoft Defender are ready."
                              return
                          }
                      }
                      catch {
                      }
                  }

                  Start-Sleep -Seconds 15
              }

              throw "Windows or Microsoft Defender did not become ready within 30 minutes."
          }

          function Ensure-HealthRestorerTaskFolder {
              $service = New-Object -ComObject "Schedule.Service"
              $service.Connect()
              $microsoft = $service.GetFolder("\\Microsoft")
              try {
                  $microsoft.GetFolder("HealthRestorer") | Out-Null
              }
              catch {
                  $microsoft.CreateFolder("HealthRestorer", $null) | Out-Null
              }
          }

          '''

          if "function Write-Progress" not in text:
              text = text.replace("function Invoke-Native {", helpers + "function Invoke-Native {")

          register = r'''function Register-ResumeTask {
              Ensure-HealthRestorerTaskFolder
              Unregister-ScheduledTask `
                  -TaskName $TaskName `
                  -Confirm:$false `
                  -ErrorAction SilentlyContinue
              Unregister-ScheduledTask `
                  -TaskName $TaskName `
                  -TaskPath $TaskPath `
                  -Confirm:$false `
                  -ErrorAction SilentlyContinue

              $escapedScriptPath = $ScriptPath.Replace("'", "''")
              $command = "Start-Sleep -Seconds 120; & '$escapedScriptPath' -Mode Resume"
              $action = New-ScheduledTaskAction `
                  -Execute $PowerShell `
                  -Argument ("-NoProfile -NonInteractive -ExecutionPolicy Bypass -Command `"{0}`"" -f $command)
              $triggers = @(
                  (New-ScheduledTaskTrigger -AtStartup),
                  (New-ScheduledTaskTrigger -AtLogOn)
              )
              $principal = New-ScheduledTaskPrincipal `
                  -UserId "SYSTEM" `
                  -LogonType ServiceAccount `
                  -RunLevel Highest
              $settings = New-ScheduledTaskSettingsSet `
                  -StartWhenAvailable `
                  -AllowStartIfOnBatteries `
                  -DontStopIfGoingOnBatteries `
                  -MultipleInstances IgnoreNew `
                  -RestartCount 12 `
                  -RestartInterval (New-TimeSpan -Minutes 5) `
                  -ExecutionTimeLimit (New-TimeSpan -Days 31)

              Register-ScheduledTask `
                  -TaskName $TaskName `
                  -TaskPath $TaskPath `
                  -Action $action `
                  -Trigger $triggers `
                  -Principal $principal `
                  -Settings $settings `
                  -Force | Out-Null

              $registered = Get-ScheduledTask `
                  -TaskName $TaskName `
                  -TaskPath $TaskPath `
                  -ErrorAction Stop
              if ($null -eq $registered) {
                  throw "Resume task registration could not be verified."
              }

              Write-Log "Protected delayed resume task registered and verified."
          }

          function Remove-ResumeTask {
              Unregister-ScheduledTask `
                  -TaskName $TaskName `
                  -TaskPath $TaskPath `
                  -Confirm:$false `
                  -ErrorAction SilentlyContinue
              Unregister-ScheduledTask `
                  -TaskName $TaskName `
                  -Confirm:$false `
                  -ErrorAction SilentlyContinue
              Write-Log "Resume tasks removed."
          }

          '''

          text, count = re.subn(
              r'function Register-ResumeTask \{.*?\n\}\n\nfunction Remove-ResumeTask \{.*?\n\}\n\n',
              register,
              text,
              count=1,
              flags=re.S
          )
          if count != 1:
              raise RuntimeError("Could not replace scheduled-task functions")

          text = text.replace(
              '    Register-ResumeTask\n    Set-Content -LiteralPath $StatePath -Value "AfterOffline" -Encoding ASCII',
              '    Register-ResumeTask\n'
              '    Write-Progress -Stage "OfflineScan" -Details "Microsoft Defender Offline scan is starting. The computer will restart."\n'
              '    Set-Content -LiteralPath $StatePath -Value "AfterOffline" -Encoding ASCII'
          )

          text = text.replace(
              '    $state = (Get-Content -LiteralPath $StatePath -Raw).Trim()\n\n    switch ($state) {',
              '    $state = (Get-Content -LiteralPath $StatePath -Raw).Trim()\n'
              '    Wait-ForResumePrerequisites\n'
              '    Write-Progress -Stage "Resume" -Details ("Continuing stage: {0}" -f $state)\n\n'
              '    switch ($state) {'
          )

          text = text.replace(
              '        "AfterOffline" {\n            Invoke-FullDefenderScan\n            Disable-Startup | Out-Null',
              '        "AfterOffline" {\n'
              '            Write-Progress -Stage "FullScan" -Details "Mandatory full Microsoft Defender scan of all accessible files is running."\n'
              '            Invoke-FullDefenderScan\n'
              '            Write-Progress -Stage "StartupCleanup" -Details "Full scan completed. Backing up and disabling third-party startup entries."\n'
              '            Disable-Startup | Out-Null'
          )

          text = text.replace(
              '            Write-Log "Boot-time disk check scheduled."\n            Restart-Computer -Force',
              '            Write-Progress -Stage "DiskCheck" -Details "Boot-time system-disk check is scheduled. The computer will restart."\n'
              '            Write-Log "Boot-time disk check scheduled."\n'
              '            Restart-Computer -Force'
          )

          text = text.replace(
              '        "AfterDisk" {\n            Set-Content -LiteralPath $StatePath -Value "Maintenance" -Encoding ASCII\n            Repair-And-Optimize',
              '        "AfterDisk" {\n'
              '            Write-Progress -Stage "Maintenance" -Details "Running DISM, SFC, cache cleanup, CHKDSK and disk optimization."\n'
              '            Set-Content -LiteralPath $StatePath -Value "Maintenance" -Encoding ASCII\n'
              '            Repair-And-Optimize'
          )

          text = text.replace(
              '            Remove-ResumeTask\n            Write-Log "All stages completed."',
              '            Remove-ResumeTask\n'
              '            Write-Progress -Stage "Completed" -Details "Main maintenance completed. Program-residue and deleted-data cleanup may continue in the final task."\n'
              '            Write-Log "All stages completed."'
          )

          text = text.replace(
              '        "Maintenance" {\n            Repair-And-Optimize',
              '        "Maintenance" {\n'
              '            Write-Progress -Stage "MaintenanceRetry" -Details "Resuming interrupted maintenance."\n'
              '            Repair-And-Optimize'
          )

          old_catch = '''catch {
              Write-Log ("FATAL: {0}" -f $_.Exception.Message)
              throw
          }
          '''
          new_catch = '''catch {
              $failure = $_.Exception.Message
              Write-Log ("FATAL: {0}" -f $failure)
              try {
                  Write-Progress -Stage "Failed" -Details $failure
              }
              catch {
              }
              throw
          }
          '''
          if old_catch in text:
              text = text.replace(old_catch, new_catch)

          required = [
              'function Wait-ForResumePrerequisites',
              '-RestartCount 12',
              'New-ScheduledTaskTrigger -AtLogOn',
              '$TaskPath = "\\Microsoft\\HealthRestorer\\"',
              'Write-Progress -Stage "FullScan"',
              'Invoke-FullDefenderScan'
          ]
          for item in required:
              if item not in text:
                  raise RuntimeError(f"Required resume fix is missing: {item}")

          path.write_text(text, encoding="utf-8")
          '@

          Set-Content -LiteralPath .\fix_resume.py -Value $patch -Encoding UTF8
          python .\fix_resume.py
          Remove-Item .\fix_resume.py -Force

          $readme = Get-Content -LiteralPath .\README.md -Raw
          if ($readme -notmatch 'HealthRestorer-progress.txt') {
              $readme += @'

          ## Продолжение после Defender Offline

          После автономной проверки программа продолжает работу автоматически. Защищённое задание Планировщика запускается через две минуты после загрузки Windows и дополнительно при входе пользователя, ожидает готовности Task Scheduler, WMI и Microsoft Defender и повторяет запуск до 12 раз с интервалом пять минут при временной ошибке.

          Текущий этап виден в файле:

          ```text
          C:\Users\Public\Desktop\HealthRestorer-progress.txt
          ```
          '@
              Set-Content -LiteralPath .\README.md -Value $readme -Encoding UTF8
          }

      - name: Validate PowerShell and workflow stages
        shell: pwsh
        run: |
          $scripts = @(
              ".\HealthRestorer.ps1",
              ".\SecureDeletedData.ps1",
              ".\ProgramResidueCleanup.ps1",
              ".\AutorunAudit.ps1",
              ".\Start-HealthRestorer.ps1"
          )

          $errors = @()
          foreach ($script in $scripts) {
              $tokens = $null
              $parseErrors = $null
              [System.Management.Automation.Language.Parser]::ParseFile(
                  (Resolve-Path $script),
                  [ref]$tokens,
                  [ref]$parseErrors
              ) | Out-Null
              foreach ($parseError in @($parseErrors)) {
                  $errors += "${script}:$($parseError.Extent.StartLineNumber): $($parseError.Message)"
              }
          }

          if ($errors.Count -gt 0) {
              throw ($errors -join "`n")
          }

          $main = Get-Content -LiteralPath .\HealthRestorer.ps1 -Raw
          foreach ($required in @(
              'Start-MpWDOScan',
              'Invoke-FullDefenderScan',
              'Wait-ForResumePrerequisites',
              'New-ScheduledTaskTrigger -AtStartup',
              'New-ScheduledTaskTrigger -AtLogOn',
              '-RestartCount 12',
              'Clear-Junk',
              'dism.exe',
              'sfc.exe',
              'chkdsk.exe',
              'defrag.exe'
          )) {
              if (-not $main.Contains($required)) {
                  throw "Required stage is missing: $required"
              }
          }

          if ($main -notmatch '"AfterOffline"\s*\{[\s\S]*?Invoke-FullDefenderScan[\s\S]*?Disable-Startup') {
              throw "Full scan is not placed before startup cleanup."
          }

      - name: Publish single-file Windows EXE
        shell: pwsh
        run: |
          dotnet publish `
              .\src\HealthRestorer.Launcher\HealthRestorer.Launcher.csproj `
              -c Release `
              -r win-x64 `
              --self-contained true `
              -o .\dist

      - name: Verify EXE metadata and checksum
        shell: pwsh
        run: |
          $exe = Get-Item .\dist\HealthRestorer.exe
          $info = $exe.VersionInfo

          if ($info.CompanyName -ne "dsa_cat_studio") {
              throw "Unexpected CompanyName: $($info.CompanyName)"
          }
          if ($info.ProductName -ne "Health Restorer") {
              throw "Unexpected ProductName: $($info.ProductName)"
          }
          if ($info.FileDescription -notmatch "dsa_cat") {
              throw "Author is missing from FileDescription."
          }
          if ($info.LegalCopyright -ne "Copyright © 2026 dsa_cat") {
              throw "Unexpected copyright: $($info.LegalCopyright)"
          }
          if ($info.FileVersion -ne "1.2.0.0") {
              throw "Unexpected FileVersion: $($info.FileVersion)"
          }

          Get-FileHash .\dist\HealthRestorer.exe -Algorithm SHA256 |
              ForEach-Object { "$($_.Hash.ToLower())  HealthRestorer.exe" } |
              Set-Content .\dist\HealthRestorer.exe.sha256 -Encoding ASCII

      - name: Commit fixed development source and EXE
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add HealthRestorer.ps1 README.md dist/HealthRestorer.exe dist/HealthRestorer.exe.sha256
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
              git commit -m "Fix post-offline continuation and rebuild EXE"
              git push origin HEAD:1.2.0-dev
          }

      - name: Update clean release branch
        shell: pwsh
        run: |
          $source = (Get-Location).Path
          git fetch origin 1.2.0
          git worktree add .\release-worktree origin/1.2.0
          Set-Location .\release-worktree
          git checkout -B 1.2.0 origin/1.2.0
          Copy-Item "$source\dist\HealthRestorer.exe" .\HealthRestorer.exe -Force
          Copy-Item "$source\dist\HealthRestorer.exe.sha256" .\HealthRestorer.exe.sha256 -Force
          Copy-Item "$source\LICENSE.md" .\LICENSE.md -Force

          @'
          # Health Restorer 1.2.0

          Готовый автономный Windows x64 EXE.

          ## Исправлено

          После Microsoft Defender Offline обслуживание автоматически продолжается через защищённое задание Планировщика. Оно запускается с задержкой после загрузки и при входе пользователя, ожидает готовности Windows и Defender и автоматически повторяет запуск при временных ошибках.

          Порядок работы:

          1. Microsoft Defender Offline.
          2. Обязательный Microsoft Defender Full Scan всех доступных файлов.
          3. Аудит и безопасное отключение сторонней автозагрузки.
          4. Предзагрузочная и онлайн-проверка дисков.
          5. DISM и SFC.
          6. Очистка кэшей, временных файлов, корзины и остатков программ.
          7. Оптимизация накопителей.
          8. Очистка свободного пространства на доступных HDD и TRIM/ReTrim на SSD.

          Текущий этап:

          ```text
          C:\Users\Public\Desktop\HealthRestorer-progress.txt
          ```

          Журнал:

          ```text
          C:\ProgramData\HealthRestorer\health-restorer.log
          ```

          Лицензия запрещает коммерческое использование без письменного разрешения dsa_cat.
          '@ | Set-Content .\README.md -Encoding UTF8

          git add HealthRestorer.exe HealthRestorer.exe.sha256 README.md LICENSE.md
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
              git commit -m "Release fixed HealthRestorer.exe 1.2.0"
              git push origin HEAD:1.2.0
          }

      - name: Upload verified EXE
        uses: actions/upload-artifact@v7
        with:
          name: HealthRestorer-win-x64-resume-fixed
          path: |
            dist/HealthRestorer.exe
            dist/HealthRestorer.exe.sha256
          retention-days: 90
