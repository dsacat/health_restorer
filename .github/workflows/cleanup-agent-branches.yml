name: Cleanup technical branches

on:
  pull_request:
    branches:
      - 1.2.0-dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'agent/cleanup-agent-branches'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout development branch
        uses: actions/checkout@v6
        with:
          ref: 1.2.0-dev
          fetch-depth: 0

      - name: Remove one-time workflow and technical branches
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git rm .github/workflows/cleanup-agent-branches.yml
          git commit -m "Remove one-time technical branch cleanup [skip ci]"
          git push origin HEAD:1.2.0-dev

          for branch in \
            agent/run-resume-fix \
            agent/verify-resume-controller \
            agent/publish-resume-release \
            agent/cleanup-agent-branches
          do
            git push origin --delete "$branch" || true
          done
