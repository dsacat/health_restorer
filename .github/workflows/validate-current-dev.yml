name: Validate current full-scan development build

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout full-scan development source
        uses: actions/checkout@v6
        with:
          ref: 1.2.0-dev

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Validate scripts and maintenance stages
        shell: pwsh
        run: |
          $scripts = @(
              ".\HealthRestorer.ps1",
              ".\SecureDeletedData.ps1",
              ".\ProgramResidueCleanup.ps1",
              ".\Start-HealthRestorer.ps1"
          )

          $messages = @()
          foreach ($script in $scripts) {
              $tokens = $null
              $parseErrors = $null
              [System.Management.Automation.Language.Parser]::ParseFile(
                  (Resolve-Path $script),
                  [ref]$tokens,
                  [ref]$parseErrors
              ) | Out-Null

              foreach ($parseError in @($parseErrors)) {
                  $messages += "${script}:$($parseError.Extent.StartLineNumber): $($parseError.Message)"
              }
          }

          if ($messages.Count -gt 0) {
              throw ($messages -join "`n")
          }

          $main = Get-Content -LiteralPath ".\HealthRestorer.ps1" -Raw
          foreach ($required in @(
              'Start-MpWDOScan',
              'Invoke-FullDefenderScan',
              '"-ScanType", "2"',
              'Remove-MpPreference',
              'Add-MpPreference',
              'Clear-Junk',
              'dism.exe',
              'sfc.exe',
              'chkdsk.exe',
              'defrag.exe'
          )) {
              if (-not $main.Contains($required)) {
                  throw "Required stage is missing: $required"
              }
          }

          if ($main -notmatch '"AfterOffline"\s*\{\s*Invoke-FullDefenderScan\s+Disable-Startup') {
              throw "Full scan is not mandatory between Offline Scan and maintenance."
          }

          $residue = Get-Content -LiteralPath ".\ProgramResidueCleanup.ps1" -Raw
          if ($residue -notmatch 'Uninstall|Residue|остат') {
              throw "Program residue cleanup is missing."
          }

          $secure = Get-Content -LiteralPath ".\SecureDeletedData.ps1" -Raw
          if ($secure -notmatch 'cipher|ReTrim|Optimize-Volume') {
              throw "Deleted-file cleanup is missing."
          }

      - name: Build autonomous Windows EXE
        shell: pwsh
        run: |
          dotnet publish `
            .\src\HealthRestorer.Launcher\HealthRestorer.Launcher.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o .\dist

      - name: Verify metadata and checksum
        shell: pwsh
        run: |
          $info = (Get-Item .\dist\HealthRestorer.exe).VersionInfo

          if ($info.CompanyName -ne "dsa_cat_studio") {
              throw "Unexpected CompanyName: $($info.CompanyName)"
          }
          if ($info.ProductName -ne "Health Restorer") {
              throw "Unexpected ProductName: $($info.ProductName)"
          }
          if ($info.FileDescription -notmatch "dsa_cat") {
              throw "Author is missing from FileDescription."
          }
          if ($info.LegalCopyright -ne "Copyright © 2026 dsa_cat") {
              throw "Unexpected copyright."
          }
          if ($info.FileVersion -ne "1.2.0.0") {
              throw "Unexpected FileVersion: $($info.FileVersion)"
          }

          Get-FileHash .\dist\HealthRestorer.exe -Algorithm SHA256 |
              ForEach-Object { "$($_.Hash.ToLower())  HealthRestorer.exe" } |
              Set-Content .\dist\HealthRestorer.exe.sha256 -Encoding ASCII

      - name: Upload verified EXE
        uses: actions/upload-artifact@v7
        with:
          name: HealthRestorer-win-x64-full-scan-final
          path: |
            dist/HealthRestorer.exe
            dist/HealthRestorer.exe.sha256
          retention-days: 90
