name: Apply mandatory full scan fix

on:
  pull_request:
    branches:
      - 1.2.0-dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  update:
    if: github.head_ref == 'main'
    runs-on: windows-latest

    steps:
      - name: Checkout development branch
        uses: actions/checkout@v6
        with:
          ref: 1.2.0-dev
          fetch-depth: 0

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Add mandatory full file scan
        shell: pwsh
        run: |
          $path = ".\HealthRestorer.ps1"
          $content = Get-Content -LiteralPath $path -Raw

          $functions = @'
          function Get-MpCmdRunPath {
              $platformRoot = Join-Path $env:ProgramData "Microsoft\Windows Defender\Platform"

              if (Test-Path -LiteralPath $platformRoot) {
                  $candidate = Get-ChildItem -LiteralPath $platformRoot -Directory -ErrorAction SilentlyContinue |
                      Sort-Object Name -Descending |
                      ForEach-Object { Join-Path $_.FullName "MpCmdRun.exe" } |
                      Where-Object { Test-Path -LiteralPath $_ } |
                      Select-Object -First 1

                  if ($candidate) {
                      return $candidate
                  }
              }

              $fallback = Join-Path $env:ProgramFiles "Windows Defender\MpCmdRun.exe"
              if (Test-Path -LiteralPath $fallback) {
                  return $fallback
              }

              throw "MpCmdRun.exe was not found."
          }

          function Set-DefenderBooleanPreference {
              param(
                  [string]$Name,
                  [bool]$Value
              )

              $parameters = @{ ErrorAction = "Stop" }
              $parameters[$Name] = $Value
              Set-MpPreference @parameters
          }

          function Invoke-FullDefenderScan {
              $status = Get-MpComputerStatus -ErrorAction Stop
              if (-not $status.AntivirusEnabled) {
                  throw "Microsoft Defender Antivirus is disabled."
              }

              try {
                  Update-MpSignature -ErrorAction Stop
                  Write-Log "Defender signatures updated before the mandatory full scan."
              }
              catch {
                  Write-Log ("Defender signature update before full scan failed: {0}" -f $_.Exception.Message)
              }

              $preference = Get-MpPreference -ErrorAction Stop
              $preferenceBackup = Join-Path $Root "defender-preferences-before-full-scan.json"
              $scanReport = Join-Path $Root "defender-full-scan-report.txt"
              $optionNames = @(
                  "DisableArchiveScanning",
                  "DisableEmailScanning",
                  "DisableRemovableDriveScanning",
                  "DisableRestorePoint",
                  "DisableScanningMappedNetworkDrivesForFullScan",
                  "DisableScanningNetworkFiles"
              )
              $savedOptions = [ordered]@{}

              foreach ($name in $optionNames) {
                  if ($preference.PSObject.Properties.Name -contains $name) {
                      $savedOptions[$name] = [bool]$preference.$name
                  }
              }

              $savedExclusions = [ordered]@{
                  Path = @($preference.ExclusionPath | Where-Object { $_ })
                  Extension = @($preference.ExclusionExtension | Where-Object { $_ })
                  Process = @($preference.ExclusionProcess | Where-Object { $_ })
              }

              [pscustomobject]@{
                  SavedAt = (Get-Date).ToString("o")
                  Options = $savedOptions
                  Exclusions = $savedExclusions
              } | ConvertTo-Json -Depth 8 | Set-Content -LiteralPath $preferenceBackup -Encoding UTF8

              try {
                  foreach ($name in $savedOptions.Keys) {
                      try {
                          Set-DefenderBooleanPreference -Name $name -Value $false
                          Write-Log ("Enabled Defender scan coverage option: {0}" -f $name)
                      }
                      catch {
                          Write-Log ("Could not enable Defender option {0}: {1}" -f $name, $_.Exception.Message)
                      }
                  }

                  foreach ($kind in @("Path", "Extension", "Process")) {
                      $values = @($savedExclusions[$kind])
                      if ($values.Count -eq 0) {
                          continue
                      }

                      try {
                          $parameters = @{ ErrorAction = "Stop" }
                          $parameters["Exclusion$kind"] = $values
                          Remove-MpPreference @parameters
                          Write-Log ("Temporarily removed Defender {0} exclusions: {1}" -f $kind, $values.Count)
                      }
                      catch {
                          Write-Log ("Could not temporarily remove Defender {0} exclusions: {1}" -f $kind, $_.Exception.Message)
                      }
                  }

                  $mpCmdRun = Get-MpCmdRunPath
                  $started = Get-Date
                  Write-Log "Starting mandatory Microsoft Defender full scan of all accessible files."

                  $process = Start-Process `
                      -FilePath $mpCmdRun `
                      -ArgumentList @("-Scan", "-ScanType", "2", "-Timeout", "30") `
                      -Wait `
                      -PassThru `
                      -WindowStyle Hidden

                  $finished = Get-Date
                  $detections = Get-MpThreatDetection -ErrorAction SilentlyContinue |
                      Select-Object -First 100 InitialDetectionTime, ThreatName, ActionSuccess, Resources

                  @(
                      "Mandatory Microsoft Defender full scan"
                      "Started: $($started.ToString('yyyy-MM-dd HH:mm:ss'))"
                      "Finished: $($finished.ToString('yyyy-MM-dd HH:mm:ss'))"
                      "Duration: $(($finished - $started).ToString())"
                      "Exit code: $($process.ExitCode)"
                      ""
                      "Recent detections:"
                      ($detections | Format-List | Out-String)
                  ) | Set-Content -LiteralPath $scanReport -Encoding UTF8

                  if ($process.ExitCode -notin @(0, 2)) {
                      throw "Microsoft Defender full scan failed with exit code $($process.ExitCode)."
                  }

                  if ($process.ExitCode -eq 2) {
                      Write-Log "Full scan completed, but Defender reported malware requiring attention or scan errors."
                  }
                  else {
                      Write-Log "Mandatory Microsoft Defender full scan completed successfully."
                  }
              }
              finally {
                  foreach ($kind in @("Path", "Extension", "Process")) {
                      $values = @($savedExclusions[$kind])
                      if ($values.Count -eq 0) {
                          continue
                      }

                      try {
                          $parameters = @{ ErrorAction = "Stop" }
                          $parameters["Exclusion$kind"] = $values
                          Add-MpPreference @parameters
                          Write-Log ("Restored Defender {0} exclusions: {1}" -f $kind, $values.Count)
                      }
                      catch {
                          Write-Log ("Could not restore Defender {0} exclusions: {1}" -f $kind, $_.Exception.Message)
                      }
                  }

                  foreach ($name in $savedOptions.Keys) {
                      try {
                          Set-DefenderBooleanPreference -Name $name -Value ([bool]$savedOptions[$name])
                      }
                      catch {
                          Write-Log ("Could not restore Defender option {0}: {1}" -f $name, $_.Exception.Message)
                      }
                  }
              }
          }

          '@

          if ($content -notmatch 'function Invoke-FullDefenderScan') {
              $needle = 'function Repair-And-Optimize {'
              if (-not $content.Contains($needle)) {
                  throw "Repair-And-Optimize insertion point was not found."
              }
              $content = $content.Replace($needle, "$functions`r`n$needle")
          }

          $oldState = @'
                  "AfterDefender" {
                      Disable-Startup | Out-Null
          '@
          $newState = @'
                  "AfterDefender" {
                      Invoke-FullDefenderScan
                      Disable-Startup | Out-Null
          '@

          if ($content.Contains($oldState)) {
              $content = $content.Replace($oldState, $newState)
          }

          if ($content -notmatch '"AfterDefender"\s*\{\s*Invoke-FullDefenderScan') {
              throw "The mandatory full scan call was not inserted into AfterDefender."
          }

          Set-Content -LiteralPath $path -Value $content -Encoding UTF8

          $readme = Get-Content -LiteralPath ".\README.md" -Raw
          if ($readme -notmatch 'обязательная полная проверка всех доступных файлов') {
              $readme += @'

          ## Полная проверка файлов

          После Microsoft Defender Offline программа обязательно запускает отдельную полную проверку Microsoft Defender. Она ждёт завершения сканирования и проверяет все доступные файлы на подключённых локальных дисках, подключённые съёмные накопители, архивы, почтовые хранилища, точки восстановления и доступные сетевые файлы. Пользовательские исключения Defender временно снимаются и затем восстанавливаются.

          Недоступные зашифрованные данные, защищённые паролем архивы, отключённые накопители и облачные файлы, которые физически не загружены на компьютер, проверить невозможно.
          '@
              Set-Content -LiteralPath ".\README.md" -Value $readme -Encoding UTF8
          }

          $buildWorkflow = Get-Content -LiteralPath ".\.github\workflows\build-exe.yml" -Raw
          $buildWorkflow = $buildWorkflow -replace '(?m)^      - main$', '      - 1.2.0-dev'
          Set-Content -LiteralPath ".\.github\workflows\build-exe.yml" -Value $buildWorkflow -Encoding UTF8

      - name: Validate all maintenance stages
        shell: pwsh
        run: |
          $scripts = @(
              ".\HealthRestorer.ps1",
              ".\SecureDeletedData.ps1",
              ".\ProgramResidueCleanup.ps1",
              ".\Start-HealthRestorer.ps1"
          )

          $messages = @()
          foreach ($script in $scripts) {
              $tokens = $null
              $parseErrors = $null
              [System.Management.Automation.Language.Parser]::ParseFile(
                  (Resolve-Path $script),
                  [ref]$tokens,
                  [ref]$parseErrors
              ) | Out-Null

              foreach ($parseError in @($parseErrors)) {
                  $messages += "${script}:$($parseError.Extent.StartLineNumber): $($parseError.Message)"
              }
          }

          if ($messages.Count -gt 0) {
              throw ($messages -join "`n")
          }

          $main = Get-Content -LiteralPath ".\HealthRestorer.ps1" -Raw
          foreach ($required in @(
              'Start-MpWDOScan',
              'Invoke-FullDefenderScan',
              '"-ScanType", "2"',
              'Clear-Junk',
              'dism.exe',
              'sfc.exe',
              'chkdsk.exe',
              'defrag.exe'
          )) {
              if (-not $main.Contains($required)) {
                  throw "Required maintenance stage is missing: $required"
              }
          }

          $residue = Get-Content -LiteralPath ".\ProgramResidueCleanup.ps1" -Raw
          if ($residue -notmatch 'Uninstall|Residue|остат') {
              throw "Program residue cleanup module was not found."
          }

          $secure = Get-Content -LiteralPath ".\SecureDeletedData.ps1" -Raw
          if ($secure -notmatch 'cipher|ReTrim|Optimize-Volume') {
              throw "Deleted-data cleanup module was not found."
          }

      - name: Publish single-file Windows EXE
        shell: pwsh
        run: |
          dotnet publish `
            .\src\HealthRestorer.Launcher\HealthRestorer.Launcher.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o .\dist

          Get-FileHash .\dist\HealthRestorer.exe -Algorithm SHA256 |
              ForEach-Object { "$($_.Hash.ToLower())  HealthRestorer.exe" } |
              Set-Content .\dist\HealthRestorer.exe.sha256 -Encoding ASCII

      - name: Verify EXE and embedded scan workflow
        shell: pwsh
        run: |
          $exe = Get-Item .\dist\HealthRestorer.exe
          $info = $exe.VersionInfo

          if ($info.CompanyName -ne "dsa_cat_studio") {
              throw "Unexpected CompanyName: $($info.CompanyName)"
          }
          if ($info.ProductName -ne "Health Restorer") {
              throw "Unexpected ProductName: $($info.ProductName)"
          }
          if ($info.FileDescription -notmatch "dsa_cat") {
              throw "Author was not found in FileDescription."
          }
          if ($info.LegalCopyright -ne "Copyright © 2026 dsa_cat") {
              throw "Unexpected copyright."
          }

          $main = Get-Content -LiteralPath ".\HealthRestorer.ps1" -Raw
          if ($main -notmatch '"AfterDefender"\s*\{\s*Invoke-FullDefenderScan') {
              throw "Mandatory full scan is not placed after the offline scan."
          }

      - name: Commit fixed development source
        shell: pwsh
        run: |
          $releaseFiles = Join-Path $env:RUNNER_TEMP "health-restorer-release"
          New-Item -ItemType Directory -Path $releaseFiles -Force | Out-Null
          Copy-Item .\dist\HealthRestorer.exe $releaseFiles -Force
          Copy-Item .\dist\HealthRestorer.exe.sha256 $releaseFiles -Force
          Copy-Item .\LICENSE.md $releaseFiles -Force

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-full-scan-fix.yml
          git add HealthRestorer.ps1 README.md .github/workflows/build-exe.yml dist/HealthRestorer.exe dist/HealthRestorer.exe.sha256
          git commit -m "Require full Defender scan of all accessible files [skip ci]"
          git push origin HEAD:1.2.0-dev

          git fetch origin 1.2.0
          git switch 1.2.0
          Copy-Item (Join-Path $releaseFiles "HealthRestorer.exe") .\HealthRestorer.exe -Force
          Copy-Item (Join-Path $releaseFiles "HealthRestorer.exe.sha256") .\HealthRestorer.exe.sha256 -Force
          Copy-Item (Join-Path $releaseFiles "LICENSE.md") .\LICENSE.md -Force

          @'
          # Health Restorer 1.2.0

          Готовая релизная сборка для Windows 10/11 x64.

          ## Файлы

          - `HealthRestorer.exe` — автономный исполняемый файл.
          - `HealthRestorer.exe.sha256` — контрольная сумма SHA-256.
          - `LICENSE.md` — некоммерческая лицензия.

          ## Что выполняется

          1. Microsoft Defender Offline до обычной загрузки Windows.
          2. Обязательная полная проверка Microsoft Defender всех доступных файлов с ожиданием завершения.
          3. Проверка и восстановление Windows через DISM и SFC.
          4. Проверка и оптимизация локальных дисков.
          5. Очистка системного, пользовательского и браузерного кэша, временных файлов и корзины.
          6. Очистка подтверждённых остатков удалённых программ.
          7. Очистка свободного места на HDD или TRIM/ReTrim на SSD.

          Полная проверка включает подключённые локальные диски, подключённые съёмные накопители, архивы, почтовые хранилища, точки восстановления и доступные сетевые файлы. Исключения Defender временно снимаются и восстанавливаются после проверки.

          Недоступные зашифрованные данные, защищённые паролем архивы, отключённые носители и не загруженные локально облачные файлы проверить невозможно.

          ## Запуск

          1. Сохрани важные файлы и закрой программы.
          2. Подключи компьютер к питанию.
          3. Запусти `HealthRestorer.exe`.
          4. Подтверди права администратора.

          Компьютер перезагрузится несколько раз. Полная проверка может продолжаться много часов.

          ## Автор

          - Автор: `dsa_cat`
          - Компания: `dsa_cat_studio`
          - Версия: `1.2.0`

          Коммерческое использование запрещено без отдельного письменного разрешения автора.
          '@ | Set-Content -LiteralPath .\README.md -Encoding UTF8

          git add HealthRestorer.exe HealthRestorer.exe.sha256 README.md LICENSE.md
          git commit -m "Publish mandatory full-scan release 1.2.0"
          git push origin HEAD:1.2.0
